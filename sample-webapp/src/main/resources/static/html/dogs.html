<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Dogs</title>
    <script>
        const httpProtocol = window.location.protocol === "https:" ? "https" : "http";
        const wsProtocol   = window.location.protocol === "https:" ? "wss" : "ws";
        const host = window.location.host;

        const apiDogUrl = httpProtocol + "://" + host + "/api/dog"
        fetch(apiDogUrl)
            .then(function (response) {
                return response.json();
            })
            .then(data => {
                const dogsUl = document.getElementById('dogsUl');
                data.map((item) => {
                    dogsUl.insertAdjacentHTML('beforeend', `<li>${item.id}</li>`);
                });
            });

        const wsUrl = wsProtocol + "://" + host + "/ws";
        const ws = new WebSocket(wsUrl);
        ws.onmessage = (event) => {
            document.getElementById("dogGreetingsCount").innerText = event.data;
        };
        function inc() {
            ws.send("inc");
        }
    </script>
</head>
<body>
<div style="display: flex; align-items: center; gap: 8px;">
    <p>Dog greetings: <span id="dogGreetingsCount"></span></p>
    <button onclick="inc()">+1</button>
</div>
<div>
    <p><b>Dogs</b></p>
    <ul id="dogsUl"></ul>
</div>
</body>
</html>
