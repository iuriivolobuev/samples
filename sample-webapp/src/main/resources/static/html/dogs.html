<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Dogs</title>
    <script>
        fetch('/api/dog')
            .then(function (response) {
                return response.json();
            })
            .then(data => {
                const dogsUl = document.getElementById('dogsUl');
                data.map((item) => {
                    dogsUl.insertAdjacentHTML('beforeend', `<li>${item.id}</li>`);
                });
            });

        const ws = new WebSocket('/api/ws/dog');
        ws.onmessage = (event) => {
            document.getElementById('dogGreetingsCount').innerText = event.data;
        };
        function inc() {
            ws.send('inc');
        }
    </script>
</head>
<body>
<div style="display: flex; align-items: center; gap: 8px;">
    <p>Dog greetings: <span id="dogGreetingsCount"></span></p>
    <button onclick="inc()">+1</button>
</div>
<div>
    <p><b>Dogs</b></p>
    <ul id="dogsUl"></ul>
</div>
</body>
</html>
