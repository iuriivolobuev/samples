<!DOCTYPE html>
<html lang="en-US">
<head>
<title>Dogs</title>
<script>
fetch('/api/dog')
.then(function(response) {return response.json();})
.then(data => {
    const dogsUl = document.getElementById('dogsUl');
    data.map((item) => {
        dogsUl.insertAdjacentHTML('beforeend', `<li>${item.id}</li>`);
    });
});
</script>
</head>
<body>
<h1>Dogs</h1>
<ul id="dogsUl"></ul>
</body>
</html>
